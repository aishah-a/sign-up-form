<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300&family=Wix+Madefor+Text:wght@400;600;800&display=swap');
        </style>        
    <title>Document</title>
</head>
<body>
    <div id="container">
        <div id="left">
            <div class="logo">
                <h3>IDIOMATICA</h3>
            </div>
            <div class="join">
                <p>Start your language journey with us!</p>
                <p>Your new polyglot community.</p>
            </div>
            <div class="graphic">
                <img src="assets/Learning languages-bro.svg">
                <div class="attribution">
                    Graphic from <a href="https://storyset.com/people">StorySet.</a>
                </div>
            </div>
        </div>
        <div id="right">
            <div id="right-container">
                <div class="cta">
                    <p>Create account.</p>
                   </div>
                <div>
                    <form action="/index.html" method="post">
                        <section>
                            <h3>Personal details</h3>
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="firstName" placeholder="Nina" required />
    
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="lastName" placeholder="Jones" required />
                        </section>
                       
                        <section>
                            <h3>Contact information</h3>
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="userEmail" placeholder="njones@gmail.com" required />

                            <label for="phone-num">Phone number</label>
                            <input type="tel" id="phone-num" name="userPhone" placeholder="123-456-789" />
                        </section>
                        
                        <section>
                            <label for="password">Create password</label>
                            <input type="password" id="password" name="userPassword" required />
    
                            <label for="pwconfirm">Confirm password</label>
                            <input type="password" id="pwconfirm" name="confPassword" required /> <!-- should name be userPassword?-->
                        </section>
                        <label for="agree">I agree to Idiomatica's Terms & Conditions.</label>
                        <input type="checkbox" id="agree" name="agreement" value="yes" required />
                        <section>
                            <button type="submit">Create account</button>
                        </section>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
