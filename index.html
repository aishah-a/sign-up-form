<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300&family=Wix+Madefor+Text:wght@400;600;800&display=swap');
    </style>        
    <title>Document</title>
</head>
<body>
    <div id="container">
        <div id="left">
            <div class="logo">
                <h3>IDIOMATICA</h3>
            </div>
            <div class="join">
                <p>Start your language journey with us!</p>
                <p>Your new polyglot community.</p>
            </div>
            <div class="graphic">
                <img src="assets/graphic.svg">
                <div class="attribution">
                    Graphic from <a href="https://storyset.com/people">StorySet</a>.
                </div>
            </div>
        </div>
        <div id="right">
            <div id="right-container">
                <div class="cta">
                    <h3>Create account.</h3>
                    <p>Already a member? <a href="#">Log in</a></p>
                   </div>
                <div>
                    <form id="form_body" onsubmit="return validateForm()">
                        <section class="sct1">
                            <div class="form-flex firstname">
                                <label for="first-name">First Name <span class="required">*</span></label>
                                <input type="text" id="first-name" name="firstName" placeholder="Nina" required />    
                            </div>
                            <div class="form-flex lastname">
                                <label for="last-name">Last Name <span class="required">*</span></label>
                                <input type="text" id="last-name" name="lastName" placeholder="Jones" required />
                            </div>
                        </section>
                       
                        <section class="sct2">
                            <div class="form-flex useremail">
                                <label for="email">E-mail <span class="required">*</span></label>
                                <input type="email" id="email" name="userEmail" placeholder="njones@gmail.com" required />    
                            </div>

                            <div class="form-flex userphone">
                                <label for="phone-num">Phone number</label>
                                <input type="tel" id="phone-num" name="userPhone" placeholder="(123)456-789" minlength="10" maxlength="11" />    
                            </div>
                        </section>
                        
                        <section class="sct3">
                            <div id="password_div" class="form-flex">
                                <label for="password">Create password <span class="required">*</span></label>
                                <input type="password" id="password_input" name="userPassword" onblur="confirm()" pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z]).{6,32}$" required/>    
                            </div>
                            
                            <div id="confpassword" class="form-flex">
                                <label for="pwconfirm">Confirm password <span class="required">*</span></label>
                                <input type="password" id="pwconfirm" name="confPassword" onblur="confirm()" required /> <!-- should name be userPassword?-->
                            </div>

                        </section>
                        <section class="sct4">
                            <div class="useragree">
                                <label for="agree">By checking this box, I agree to Idiomatica's Terms & Conditions. <span class="required">*</span></label>
                                <input type="checkbox" id="agree" name="agreement" value="yes" required />
    
                            </div>
                        </section>

                        <section class="sct5">
                            <div class="form-flex submit-btn">
                                <button type="submit" id="submitbtn">Create account</button>
                            </div>
                        </section>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
